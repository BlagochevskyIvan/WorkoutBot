services:
  db:
    image: postgres:15
    container_name: workout_bot-db-1
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:                                  # ✅ Проверяем, что Postgres готов
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend

  app:
    build: .
    container_name: workout_bot-app-1

    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy                # ✅ ждём, пока healthcheck скажет "ok"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - backend

volumes:
  db_data:

networks:
  backend:
    driver: bridge
