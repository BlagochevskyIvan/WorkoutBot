services:
  db:
    image: postgres:15
    container_name: workout_bot-db-1
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:                                  # ✅ Проверяем, что Postgres готов
      test: ["CMD-SHELL", "pg_isready -U postgres -d db"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend

  app:
    build: .
    container_name: workout_bot-app
    command: >
      sh -c "echo '⏳ Waiting for DB...' &&
             until pg_isready -h db -U postgres -d db; do sleep 1; done &&
             echo '✅ DB is ready! Starting app...' &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/db
    depends_on:
      db:
        condition: service_healthy                # ✅ ждём, пока healthcheck скажет "ok"
    # ports:
    #   - "8000:8000"
    expose:
      - "8000"
    volumes:
      - .:/app
    networks:
      - backend
  
  web:
    build:
      context: ./web
      
    container_name: miniapp_web
    
     
    restart: unless-stopped
    env_file:
      - ./.env
    expose:
      - "3000"
    depends_on:
      - app
    volumes:
      - ./web:/app
      - /app/node_modules
    networks:
      - backend
  
  nginx:
    image: nginx:1.27-alpine
    container_name: miniapp_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - app
    networks:
      - backend

volumes:
  db_data:

networks:
  backend:
    driver: bridge
