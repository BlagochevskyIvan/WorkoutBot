services:
  db:
    image: postgres:15
    container_name: workout_bot-db-1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db"]
      interval: 1s
      timeout: 3s
      retries: 15
      start_period: 2s
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workout_bot-app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app"]
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/db
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ./main.py:/app/main.py
      - ./config:/app/config
      - ./db:/app/db
      - ./handlers:/app/handlers
      - ./libs:/app/libs
      - ./server:/app/server
      - ./bot_cache:/app/bot_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8000), 2).close()"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 15s
    networks:
      - backend
  
  web:
    build:
      context: ./web
    container_name: miniapp_web
    env_file:
      - ./.env
    environment:
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL}
    expose:
      - "3000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
    healthcheck:
      test: ["CMD", "node", "-e", "const net = require('net'); const socket = net.createConnection({host: '127.0.0.1', port: 3000}); socket.setTimeout(2000); socket.on('connect', () => { socket.end(); process.exit(0); }); socket.on('error', () => process.exit(1)); socket.on('timeout', () => process.exit(1));"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 10s
    networks:
      - backend
  
  nginx:
    image: nginx:1.27-alpine
    container_name: miniapp_nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - backend

volumes:
  db_data:
  web_node_modules:
  web_next_cache:

networks:
  backend:
    driver: bridge
